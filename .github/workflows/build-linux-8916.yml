name: build-msm8916-linux-v6.12-full

on:
  workflow_dispatch:
    inputs:
      old_kernel_repo:
        description: "原 5.15 内核仓库地址"
        required: true
        default: "https://github.com/OpenStick/linux.git"

      old_kernel_ref:
        description: "原 5.15 分支或 tag"
        required: true
        default: "master"

      old_defconfig:
        description: "原项目 defconfig 名称"
        required: true
        default: "msm8916_defconfig"

      new_kernel_repo:
        description: "主线内核仓库"
        required: true
        default: "https://github.com/msm8916-mainline/linux.git"

      new_kernel_ref:
        description: "主线内核分支或 tag"
        required: true
        default: "v6.12.1-msm8916"

      device_dtb:
        description: "目标 DTB 相对路径"
        required: true
        default: "arch/arm64/boot/dts/qcom/msm8916-thwc-ufi001c.dtb"

      rootfs_zip_url:
        description: "debian.zip 下载地址"
        required: true
        default: "https://github.com/OpenStick/OpenStick/releases/download/v1/debian.zip"

      rootfs_grow_mb:
        description: "rootfs 扩容 (MB)"
        required: true
        default: "2048"

      boot_base:
        description: "mkbootimg --base"
        required: true
        default: "0x80000000"

      boot_kernel_offset:
        description: "mkbootimg --kernel_offset"
        required: true
        default: "0x00080000"

      boot_ramdisk_offset:
        description: "mkbootimg --ramdisk_offset"
        required: true
        default: "0x02000000"

      boot_tags_offset:
        description: "mkbootimg --tags_offset"
        required: true
        default: "0x01e00000"

      boot_pagesize:
        description: "mkbootimg --pagesize"
        required: true
        default: "2048"

      boot_cmdline:
        description: "内核 cmdline"
        required: true
        default: "earlycon root=PARTUUID=a7ab80e8-e9d1-e8cd-f157-93f69b1d141e console=ttyMSM0,115200 no_framebuffer=true rw"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      ARCH: arm64
      CROSS_COMPILE: aarch64-linux-gnu-
      LOCALVERSION: -msm8916-mainline

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget unzip rsync bc bison flex build-essential \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            libssl-dev libelf-dev libdw-dev libncurses-dev pahole \
            cpio fakeroot dpkg-dev debhelper devscripts equivs kmod \
            xz-utils zstd python3 qemu-user-static binfmt-support \
            e2fsprogs fdisk util-linux android-sdk-libsparse-utils \
            mkbootimg dwarves crossbuild-essential-arm64

      - name: Prepare directories
        run: mkdir -p artifacts/kernel artifacts/deb artifacts/config artifacts/rootfs work

      - name: Clone old 5.15 kernel tree
        run: |
          git clone --depth=1 --branch "${{ inputs.old_kernel_ref }}" \
            "${{ inputs.old_kernel_repo }}" linux-old

      - name: Expand old 5.15 defconfig
        run: |
          set -euxo pipefail
          mkdir -p build-old
          make -C linux-old O="$PWD/build-old" ARCH="$ARCH" CROSS_COMPILE="$CROSS_COMPILE" \
            ${{ inputs.old_defconfig }} olddefconfig
          cp build-old/.config work/old-5.15.full.config

      - name: Clone msm8916-mainline linux
        run: |
          git clone --depth=1 --branch "${{ inputs.new_kernel_ref }}" \
            "${{ inputs.new_kernel_repo }}" linux

      - name: Generate v6.12 config
        run: |
          set -euxo pipefail
          mkdir -p build
          # 使用新仓库自带的 msm8916_defconfig 作为基准
          make -C linux O="$PWD/build" ARCH="$ARCH" CROSS_COMPILE="$CROSS_COMPILE" \
            msm8916_defconfig

          # 合并旧配置和额外的碎片配置
          KCONFIG_CONFIG="$PWD/build/.config" \
            bash linux/scripts/kconfig/merge_config.sh \
            -m -r -O "$PWD/build" \
            "$PWD/build/.config" \
            "$PWD/work/old-5.15.full.config" \
            "${{ github.workspace }}/config/frag.config" || true

          make -C linux O="$PWD/build" ARCH="$ARCH" CROSS_COMPILE="$CROSS_COMPILE" \
            LOCALVERSION="$LOCALVERSION" olddefconfig
          
          cp build/.config artifacts/config/linux-6.12.msm8916.config

      - name: Audit critical config
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          def parse(path):
              cfg = {}
              for line in Path(path).read_text().splitlines():
                  if line.startswith("CONFIG_") and "=" in line:
                      k, v = line.split("=", 1)
                      cfg[k] = v
              return cfg
          new = parse("build/.config")
          critical = ["CONFIG_ARCH_QCOM", "CONFIG_SERIAL_MSM", "CONFIG_MMC_SDHCI_MSM", "CONFIG_EXT4_FS"]
          bad = [k for k in critical if new.get(k) != "y"]
          if bad:
              print(f"Critical config missing: {bad}")
              exit(1)
          PY

      - name: Build kernel and modules
        run: |
          set -euxo pipefail
          make -C linux O="$PWD/build" ARCH="$ARCH" CROSS_COMPILE="$CROSS_COMPILE" \
            LOCALVERSION="$LOCALVERSION" -j"$(nproc)" Image.gz dtbs modules
          
          cat build/arch/arm64/boot/Image.gz "build/${{ inputs.device_dtb }}" > artifacts/kernel/kernel-dtb
          cp build/vmlinux artifacts/kernel/

      - name: Install build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            bc \
            bison \
            flex \
            fakeroot \
            dpkg-dev \
            debhelper \
            rsync \
            kmod \
            cpio \
            python3 \
            libssl-dev \
            libelf-dev \
            dwarves \
            crossbuild-essential-arm64

      - name: Build Debian packages with bindeb-pkg
        run: |
          set -euxo pipefail
          test -f build/.config
          # 增加 KDEB_COMPRESS=xz 环境变量
          fakeroot make -C linux \
            O="$PWD/build" \
            ARCH="$ARCH" \
            CROSS_COMPILE="$CROSS_COMPILE" \
            LOCALVERSION="$LOCALVERSION" \
            -j"$(nproc)" \
            bindeb-pkg \
            KDEB_PKGVERSION=1.4 \
            KDEB_COMPRESS=xz \
            DPKG_FLAGS="-d"
      
      - name: Collect Debian package artifacts
        run: |
          set -euxo pipefail
          mkdir -p artifacts/deb
          find . -maxdepth 1 -type f -name "*.deb" -exec cp -v {} artifacts/deb/ \;
          find . -maxdepth 1 -type f -name "*.changes" -exec cp -v {} artifacts/deb/ \; || true
          find . -maxdepth 1 -type f -name "*.buildinfo" -exec cp -v {} artifacts/deb/ \; || true
          ls -lah artifacts/deb

    
      - name: Download and extract debian.zip
        run: |
          set -euxo pipefail
          cd work
          curl -L "${{ inputs.rootfs_zip_url }}" -o debian.zip
          unzip -q debian.zip -d debian_zip

          ROOTFS_IMG="$(find debian_zip -type f -name 'rootfs.img' | head -n1 || true)"
          if [ -z "$ROOTFS_IMG" ]; then
            ROOTFS_IMG="$(find debian_zip -type f -name '*.img' | head -n1 || true)"
          fi

          if [ -z "$ROOTFS_IMG" ]; then
            echo "No rootfs.img found in debian.zip"
            exit 1
          fi

          # 【修改这里】使用 $PWD 将其转换为绝对路径再导出
          echo "ROOTFS_IMG=$PWD/$ROOTFS_IMG" >> "$GITHUB_ENV"
          ls -lah "$ROOTFS_IMG"

      - name: Install kernel debs into rootfs and extract initrd
        run: |
          set -euxo pipefail

          mkdir -p /tmp/rootfs-mnt

          # 将 sparse image 转换成 raw；如果本来就是 raw，则直接复制
          if simg2img "$ROOTFS_IMG" work/root.img 2>/dev/null; then
            echo "Converted sparse rootfs.img to raw root.img"
          else
            cp "$ROOTFS_IMG" work/root.img
            echo "rootfs.img is already raw, copied to work/root.img"
          fi

          # 如果是单 ext4 文件系统镜像，并且指定了扩容，就先扩容
          if [ "${{ inputs.rootfs_grow_mb }}" != "0" ]; then
            if blkid -p work/root.img | grep -q 'TYPE="ext4"'; then
              truncate -s +"${{ inputs.rootfs_grow_mb }}M" work/root.img
              e2fsck -fy work/root.img || true
              resize2fs work/root.img
            else
              echo "root.img is not a plain ext4 filesystem image, skip resize"
            fi
          fi

          LOOPDEV=""
          ROOTDEV=""

          cleanup() {
            set +e
            sync
            sudo umount /tmp/rootfs-mnt/proc 2>/dev/null || true
            sudo umount /tmp/rootfs-mnt/dev/pts 2>/dev/null || true
            sudo umount /tmp/rootfs-mnt/dev 2>/dev/null || true
            sudo umount /tmp/rootfs-mnt/sys 2>/dev/null || true
            sudo umount /tmp/rootfs-mnt 2>/dev/null || true
            if [ -n "${LOOPDEV:-}" ]; then
              sudo losetup -d "$LOOPDEV" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          LOOPDEV="$(sudo losetup --find --show --partscan work/root.img)"
          echo "LOOPDEV=$LOOPDEV"

          if ls ${LOOPDEV}p* >/dev/null 2>&1; then
            ROOTDEV="$(ls ${LOOPDEV}p* | head -n1)"
          else
            ROOTDEV="$LOOPDEV"
          fi
          echo "ROOTDEV=$ROOTDEV"

          sudo mount "$ROOTDEV" /tmp/rootfs-mnt

          sudo mkdir -p /tmp/rootfs-mnt/root
          sudo mkdir -p /tmp/rootfs-mnt/usr/bin

          sudo cp /usr/bin/qemu-aarch64-static /tmp/rootfs-mnt/usr/bin/
          sudo cp artifacts/deb/*.deb /tmp/rootfs-mnt/root/
          sudo cp /etc/resolv.conf /tmp/rootfs-mnt/etc/resolv.conf || true

          sudo mount --bind /proc /tmp/rootfs-mnt/proc
          sudo mount --bind /dev /tmp/rootfs-mnt/dev
          sudo mount --bind /dev/pts /tmp/rootfs-mnt/dev/pts
          sudo mount --bind /sys /tmp/rootfs-mnt/sys
          # 进入 Chroot 执行升级和内核替换
          sudo chroot /tmp/rootfs-mnt /usr/bin/qemu-aarch64-static /bin/bash -eux <<'CHROOT'
          export DEBIAN_FRONTEND=noninteractive
          export PATH=/usr/sbin:/usr/bin:/sbin:/bin

          # 1. 彻底清理旧的源，防止第三方源（如 Mobian）干扰
          rm -rf /etc/apt/sources.list.d/*
          cat > /etc/apt/sources.list <<'EOF'
          deb http://deb.debian.org/debian/ trixie main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian/ trixie-updates main contrib non-free non-free-firmware
          deb http://security.debian.org/debian-security trixie-security main contrib non-free non-free-firmware
          EOF

          # 2. 解决 GPG 签名问题 (信任引导)
          # 先尝试更新一次，允许不安全的仓库以便下载最新的 keyring
          apt-get update -o Acquire::AllowInsecureRepositories=true || true
          
          # 强制安装最新的 Debian 密钥环，跳过签名验证
          apt-get install -y --allow-unauthenticated debian-archive-keyring

          # 现在有了密钥，重新进行正常的更新
          apt-get update
          # 【新增：修复 mobian-tweaks-common 卸载失败的问题】
          # 强制让报错的 prerm 脚本失效
          if [ -f /var/lib/dpkg/info/mobian-tweaks-common.prerm ]; then
            echo "#!/bin/sh" > /var/lib/dpkg/info/mobian-tweaks-common.prerm
            echo "exit 0" >> /var/lib/dpkg/info/mobian-tweaks-common.prerm
          fi
          # 强制移除 Mobian 相关可能冲突的包
          apt-get purge -y mobian-tweaks-common mobian-keyring || true

          # 2. 准备升级
          # 防止服务自动启动
          cat > /usr/sbin/policy-rc.d <<'EOF'
          #!/bin/sh
          exit 101
          EOF
          chmod +x /usr/sbin/policy-rc.d

          # 执行大规模版本升级
          apt-get update
          apt-get dist-upgrade -y -o Dpkg::Options::="--force-confold"

          # 3. 安装必要工具（Debian 13 之后建议确保安装 initramfs-tools）
          apt-get install -y --no-install-recommends initramfs-tools busybox kmod udev

          # 4. 清理旧内核（此时你的 grep 逻辑会清理掉旧的 5.15）
          OLDPKGS="$(dpkg-query -W -f='${Package}\n' 2>/dev/null | grep -E '^linux-(image|headers)-' || true)"
          if [ -n "$OLDPKGS" ]; then
            apt-get purge -y $OLDPKGS || true
          fi

          # 5. 安装你自己编译的新内核 (.deb 现在是 XZ 压缩，Debian 13 肯定能识别)
          # 注意：这里如果 dpkg 失败，set -e 会让脚本报错停止，方便排查
          dpkg -i /root/linux-image-6.12.1-*.deb
          if ls /root/linux-headers-6.12.1-*.deb >/dev/null 2>&1; then
            dpkg -i /root/linux-headers-6.12.1-*.deb
          fi

          # 6. 获取新内核版本号并生成 initrd
          # 查找刚安装的 7.0.0 目录
          NEW_KVER="$(basename "$(ls -1dt /lib/modules/6.12.1* | head -n1)")"
          echo "NEW_KVER=$NEW_KVER"

          depmod "$NEW_KVER"
          update-initramfs -c -k "$NEW_KVER"

          # 清理工作
          rm -f /usr/sbin/policy-rc.d
          CHROOT

          INITRD="$(ls -1t /tmp/rootfs-mnt/boot/initrd.img-* | head -n1)"
          test -f "$INITRD"

          sudo cp "$INITRD" artifacts/kernel/initrd.img

          # 先清理挂载，再重新打包 rootfs
          cleanup
          trap - EXIT

          if img2simg work/root.img artifacts/rootfs/rootfs.img 2>/dev/null; then
            echo "Converted raw root.img back to sparse rootfs.img"
          else
            cp work/root.img artifacts/rootfs/rootfs.img
            echo "img2simg failed or unavailable, keeping raw rootfs.img"
          fi

          sudo chown -R "$USER":"$USER" artifacts

      - name: Generate boot.img
        run: |
          set -euxo pipefail
          
          # 修复下载命令：去掉 -o 参数，正确解码 Base64
          # 从 Android 11 分支下载单文件版 mkbootimg.py (无 gki 依赖)
          curl -sL "https://android.googlesource.com/platform/system/tools/mkbootimg/+/refs/tags/android-11.0.0_r1/mkbootimg.py?format=TEXT" | base64 -d > mkbootimg.py
          chmod +x mkbootimg.py

          test -f artifacts/kernel/kernel-dtb
          test -f artifacts/kernel/initrd.img

          # 使用下载的脚本进行打包
          python3 mkbootimg.py \
            --base "${{ inputs.boot_base }}" \
            --kernel_offset "${{ inputs.boot_kernel_offset }}" \
            --ramdisk_offset "${{ inputs.boot_ramdisk_offset }}" \
            --tags_offset "${{ inputs.boot_tags_offset }}" \
            --pagesize "${{ inputs.boot_pagesize }}" \
            --second_offset "${{ inputs.boot_second_offset }}" \
            --ramdisk artifacts/kernel/initrd.img \
            --cmdline "${{ inputs.boot_cmdline }}" \
            --kernel artifacts/kernel/kernel-dtb \
            -o artifacts/kernel/boot.img

          ls -lah artifacts/kernel/boot.img

          ls -lah artifacts/kernel/boot.img

      - name: Generate SHA256
        run: |
          set -euxo pipefail
          (
            cd artifacts
            find . -type f -print0 | sort -z | xargs -0 sha256sum
          ) > artifacts/SHA256SUMS.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: msm8916-linux-${{ inputs.new_kernel_ref }}-${{ github.run_number }}
          path: artifacts
          if-no-files-found: error

name: build-msm8916-linux-v6.12-patch

on:
  workflow_dispatch:
    inputs:
      new_kernel_repo:
        description: "主线内核仓库"
        required: true
        default: "https://github.com/msm8916-mainline/linux.git"

      new_kernel_ref:
        description: "主线内核分支或 tag"
        required: true
        default: "v6.12.1-msm8916"

      device_dtb:
        description: "目标 DTB 相对路径"
        required: true
        default: "arch/arm64/boot/dts/qcom/msm8916-thwc-ufi001c.dtb"

      kernel_base_version:
        description: "内核主版本，例如 6.12"
        required: true
        default: "6.12"

      kernel_current_patchlevel:
        description: "当前内核 patchlevel，例如 1 表示 v6.12.1"
        required: true
        default: "1"

      apply_latest_stable_patch:
        description: "是否自动应用 kernel.org 最新 stable patch"
        required: true
        default: "true"

      extra_patch_urls:
        description: "额外补丁 URL，多个用空格分隔，可留空"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      ARCH: arm64
      CROSS_COMPILE: aarch64-linux-gnu-
      LOCALVERSION: -exram

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euxo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            git curl wget unzip rsync bc bison flex build-essential \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            libssl-dev libelf-dev libdw-dev libncurses-dev pahole \
            cpio fakeroot dpkg-dev debhelper devscripts equivs kmod \
            xz-utils zstd python3 dwarves crossbuild-essential-arm64 \
            jq

      - name: Prepare directories
        run: |
          set -euxo pipefail

          mkdir -p artifacts/kernel artifacts/deb artifacts/config artifacts/patch-log build

      - name: Prepare artifact name
        id: artifact_name
        run: |
          set -euxo pipefail

          SAFE_REF="$(echo '${{ inputs.new_kernel_ref }}' | tr '/:@ ' '----')"
          echo "name=msm8916-linux-${SAFE_REF}-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Clone msm8916-mainline linux
        run: |
          set -euxo pipefail

          git clone --depth=1 --branch "${{ inputs.new_kernel_ref }}" \
            "${{ inputs.new_kernel_repo }}" linux

          git -C linux status
          git -C linux log --oneline -n 5

          echo "Kernel Makefile version before patch:"
          grep -E '^(VERSION|PATCHLEVEL|SUBLEVEL|EXTRAVERSION) = ' linux/Makefile || true
          make -C linux kernelversion || true

      - name: Apply kernel.org stable incremental patches
        if: ${{ inputs.apply_latest_stable_patch == 'true' }}
        run: |
          set -euxo pipefail

          BASE="${{ inputs.kernel_base_version }}"
          CURRENT="${{ inputs.kernel_current_patchlevel }}"
          MAJOR="${BASE%%.*}"

          echo "Base kernel version: ${BASE}"
          echo "Current patchlevel: ${CURRENT}"

          LATEST_VERSION="$(
            curl -fsSL https://www.kernel.org/releases.json |
            jq -r --arg base "$BASE" '
              .releases[]
              | select(.version | test("^" + $base + "\\.[0-9]+$"))
              | .version
            ' |
            sort -V |
            tail -n1
          )"

          if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" = "null" ]; then
            echo "Could not find latest stable version for ${BASE}"
            exit 1
          fi

          TARGET="${LATEST_VERSION##*.}"

          echo "Latest stable version detected: ${LATEST_VERSION}"
          echo "Target patchlevel: ${TARGET}"

          {
            echo "Base version: ${BASE}"
            echo "Current patchlevel: ${CURRENT}"
            echo "Latest stable version: ${LATEST_VERSION}"
            echo "Target patchlevel: ${TARGET}"
          } > artifacts/patch-log/stable-version-info.txt

          if [ "$TARGET" -le "$CURRENT" ]; then
            echo "Current kernel is already >= target: ${BASE}.${CURRENT} >= ${BASE}.${TARGET}"
            exit 0
          fi

          cd linux

          echo "Kernel version before patch:"
          grep -E '^(VERSION|PATCHLEVEL|SUBLEVEL|EXTRAVERSION) = ' Makefile || true
          make kernelversion || true

          auto_resolve_ktd2692_conflict() {
            local patch_name="$1"
            local log_dir="$2"

            local file="drivers/leds/flash/leds-ktd2692.c"
            local rej="${file}.rej"
            local orig="${file}.orig"

            echo "Checking whether conflict can be auto-resolved for ${file}"

            if [ ! -f "$rej" ]; then
              echo "Known reject file not found: $rej"
              return 1
            fi

            echo "Found known reject file: $rej"
            echo "Reject content:"
            cat "$rej" | tee "$log_dir/ktd2692.reject.txt"

            if ! grep -q "led->props.timing = ktd2692_timing;" "$rej"; then
              echo "Reject file does not contain expected ktd2692 timing line."
              return 1
            fi

            python3 <<'PY'
            from pathlib import Path
            p = Path("drivers/leds/flash/leds-ktd2692.c")
            if not p.exists():
                raise SystemExit("drivers/leds/flash/leds-ktd2692.c does not exist")
            s = p.read_text()
            insert = "\tled->props.timing = ktd2692_timing;\n"
            needle = "\tled_cdev = &fled_cdev->led_cdev;\n"
            if "led->props.timing = ktd2692_timing;" in s:
                print("Already contains led->props.timing = ktd2692_timing;")
            else:
                if needle not in s:
                    raise SystemExit("Cannot find insertion point: led_cdev = &fled_cdev->led_cdev;")
                s = s.replace(needle, needle + insert, 1)
                p.write_text(s)
                print("Inserted led->props.timing = ktd2692_timing;")
            PY

            rm -f "$rej"
            rm -f "$orig"

            echo "Auto-resolved known ktd2692 conflict for ${patch_name}"

            {
              echo "Patch: ${patch_name}"
              echo "Auto-resolved file: ${file}"
              echo "Inserted line:"
              echo "led->props.timing = ktd2692_timing;"
            } > "$log_dir/ktd2692-auto-resolved.txt"

            return 0
          }

          for NEXT in $(seq $((CURRENT + 1)) "$TARGET"); do
            PREV=$((NEXT - 1))

            PATCH_NAME="patch-${BASE}.${PREV}-${NEXT}"
            PATCH_URL="https://cdn.kernel.org/pub/linux/kernel/v${MAJOR}.x/incr/${PATCH_NAME}.xz"
            PATCH_XZ="/tmp/${PATCH_NAME}.xz"
            PATCH_TXT="/tmp/${PATCH_NAME}.patch"

            LOG_DIR="../artifacts/patch-log/${PATCH_NAME}"
            mkdir -p "$LOG_DIR"

            APPLY_LOG="$LOG_DIR/apply.log"
            REJECT_FILES="$LOG_DIR/reject-files.txt"
            REJECT_HUNKS="$LOG_DIR/reject-hunks.txt"

            : > "$APPLY_LOG"
            : > "$REJECT_FILES"
            : > "$REJECT_HUNKS"

            echo "============================================================"
            echo "Applying stable incremental patch:"
            echo "${PATCH_URL}"
            echo "============================================================"

            curl -fL "$PATCH_URL" -o "$PATCH_XZ"
            xzcat "$PATCH_XZ" > "$PATCH_TXT"

            # 删除旧的 reject 文件，避免把上一个补丁的冲突误判为当前补丁冲突。
            find . -name "*.rej" -type f -delete

            set +e
            patch -p1 --forward --batch < "$PATCH_TXT" > "$APPLY_LOG" 2>&1
            APPLY_RC=$?
            set -e

            echo "patch exit code: $APPLY_RC"

            if [ "$APPLY_RC" -ne 0 ]; then
              echo "Patch returned non-zero: ${PATCH_NAME}"
              echo "Patch log tail:"
              tail -n 300 "$APPLY_LOG" || true
            fi

            find . -name "*.rej" -type f | sort > "$REJECT_FILES"

            if [ -s "$REJECT_FILES" ]; then
              echo "Reject files found after ${PATCH_NAME}:"
              cat "$REJECT_FILES"

              {
                echo "Reject hunks for ${PATCH_NAME}:"
                while IFS= read -r rej; do
                  [ -z "$rej" ] && continue
                  src="${rej%.rej}"
                  rel="${src#./}"

                  echo
                  echo "============================================================"
                  echo "Patch: ${PATCH_NAME}"
                  echo "Conflict file: $rel"
                  echo "Reject file: ${rej#./}"
                  echo "============================================================"
                  cat "$rej"
                done < "$REJECT_FILES"
              } | tee "$REJECT_HUNKS"

              REJECT_COUNT="$(wc -l < "$REJECT_FILES" | tr -d ' ')"
              ONLY_REJECT="$(cat "$REJECT_FILES")"

              if [ "$REJECT_COUNT" = "1" ] && [ "$ONLY_REJECT" = "./drivers/leds/flash/leds-ktd2692.c.rej" ]; then
                echo "Only known ktd2692 conflict detected. Trying auto-resolve."

                if auto_resolve_ktd2692_conflict "$PATCH_NAME" "$LOG_DIR"; then
                  echo "Known ktd2692 conflict resolved."
                else
                  echo "Failed to auto-resolve known ktd2692 conflict."
                  exit 1
                fi
              else
                echo "Unhandled patch conflicts found. Failing."
                exit 1
              fi
            fi

            REMAINING_REJECTS="$(find . -name "*.rej" -type f | sort || true)"
            if [ -n "$REMAINING_REJECTS" ]; then
              echo "Unresolved reject files remain:"
              echo "$REMAINING_REJECTS"
              exit 1
            fi

            if [ "$APPLY_RC" -ne 0 ]; then
              echo "Patch command returned non-zero, but known reject was resolved."
              echo "Verifying no reject files remain before continuing."
            fi

            echo "Applied stable patch ${BASE}.${PREV} -> ${BASE}.${NEXT}"

            echo "Kernel Makefile version after patch ${BASE}.${NEXT}:"
            grep -E '^(VERSION|PATCHLEVEL|SUBLEVEL|EXTRAVERSION) = ' Makefile || true
            make kernelversion || true

            echo "Git status short after ${BASE}.${NEXT}:"
            git status --short || true
          done

          echo "============================================================"
          echo "Finished stable patching."
          echo "============================================================"

          echo "Final kernel version:"
          make kernelversion || true

          echo "Final Makefile version fields:"
          grep -E '^(VERSION|PATCHLEVEL|SUBLEVEL|EXTRAVERSION) = ' Makefile || true

          echo "Final git status:"
          git status --short || true

      - name: Apply extra patch URLs
        if: ${{ inputs.extra_patch_urls != '' }}
        env:
          EXTRA_PATCH_URLS: ${{ inputs.extra_patch_urls }}
        run: |
          set -euxo pipefail

          cd linux

          i=0

          for URL in $EXTRA_PATCH_URLS; do
            i=$((i + 1))

            RAW_PATCH="/tmp/extra-${i}.download"
            PATCH="/tmp/extra-${i}.patch"
            PATCH_LOG="../artifacts/patch-log/extra-${i}.log"

            echo "============================================================"
            echo "Downloading extra patch:"
            echo "${URL}"
            echo "============================================================"

            curl -fL "$URL" -o "$RAW_PATCH"

            case "$URL" in
              *.xz)
                xzcat "$RAW_PATCH" > "$PATCH"
                ;;
              *.gz)
                zcat "$RAW_PATCH" > "$PATCH"
                ;;
              *.zst)
                zstd -dc "$RAW_PATCH" > "$PATCH"
                ;;
              *)
                cp "$RAW_PATCH" "$PATCH"
                ;;
            esac

            echo "Checking patch type..."

            if grep -q "^From [0-9a-fA-F]\{40\} " "$PATCH" || grep -q "^Subject: " "$PATCH"; then
              echo "Applying as git mailbox patch with git am"

              if ! git am "$PATCH" > "$PATCH_LOG" 2>&1; then
                echo "git am failed."
                tail -n 300 "$PATCH_LOG" || true
                git am --abort || true
                exit 1
              fi
            else
              echo "Applying as plain diff with git apply"

              if ! git apply --check "$PATCH" > "$PATCH_LOG.check" 2>&1; then
                echo "git apply --check failed."
                tail -n 300 "$PATCH_LOG.check" || true
                exit 1
              fi

              if ! git apply "$PATCH" > "$PATCH_LOG" 2>&1; then
                echo "git apply failed."
                tail -n 300 "$PATCH_LOG" || true
                exit 1
              fi
            fi

            echo "Applied extra patch: ${URL}"
          done

          echo "Git status after extra patches:"
          git status --short || true

      - name: Save kernel source version info
        if: always()
        run: |
          set -euxo pipefail

          {
            echo "Repository: ${{ inputs.new_kernel_repo }}"
            echo "Ref: ${{ inputs.new_kernel_ref }}"
            echo "Device DTB: ${{ inputs.device_dtb }}"
            echo "Base version: ${{ inputs.kernel_base_version }}"
            echo "Current patchlevel input: ${{ inputs.kernel_current_patchlevel }}"
            echo "Apply latest stable patch: ${{ inputs.apply_latest_stable_patch }}"
            echo "Extra patch URLs: ${{ inputs.extra_patch_urls }}"
            echo

            echo "make kernelversion:"
            make -C linux kernelversion || true
            echo

            echo "git HEAD:"
            git -C linux log --oneline -n 10 || true
            echo

            echo "git status:"
            git -C linux status --short || true
            echo

            echo "Top-level Makefile version fields:"
            grep -E '^(VERSION|PATCHLEVEL|SUBLEVEL|EXTRAVERSION) = ' linux/Makefile || true
          } > artifacts/kernel/source-version.txt

      - name: Copy DTS from checked out repo
        run: |
          set -euxo pipefail

          DTS_DIR="linux/arch/arm64/boot/dts/qcom"
          mkdir -p "$DTS_DIR"

          find "$GITHUB_WORKSPACE" -maxdepth 2 -type f \( -name "*.dts" -o -name "*.dtsi" \) \
            -exec cp -v {} "$DTS_DIR"/ \;

          ls linux/arch/arm64/boot/dts/qcom | grep "msm8916" || true

      - name: Use repo config as kernel config
        run: |
          set -euxo pipefail

          test -f "$GITHUB_WORKSPACE/config/new.config"

          cp "$GITHUB_WORKSPACE/config/new.config" build/.config

          make -C linux O="$PWD/build" ARCH="$ARCH" CROSS_COMPILE="$CROSS_COMPILE" \
            LOCALVERSION="$LOCALVERSION" olddefconfig

          cp build/.config artifacts/config/linux-6.12.msm8916.config

      - name: Audit critical config
        run: |
          set -euxo pipefail

          python3 - <<'PY'
          from pathlib import Path
          
          def parse(path):
              cfg = {}
              for line in Path(path).read_text().splitlines():
                  if line.startswith("CONFIG_") and "=" in line:
                      k, v = line.split("=", 1)
                      cfg[k] = v
              return cfg
          
          new = parse("build/.config")
          
          critical = [
              "CONFIG_ARCH_QCOM",
              "CONFIG_SERIAL_MSM",
              "CONFIG_MMC_SDHCI_MSM",
              "CONFIG_EXT4_FS",
          ]
          
          bad = [k for k in critical if new.get(k) != "y"]
          
          if bad:
              print(f"Critical config missing: {bad}")
              exit(1)
          PY

      - name: Build kernel and modules
        run: |
          set -euxo pipefail

          make -C linux O="$PWD/build" ARCH="$ARCH" CROSS_COMPILE="$CROSS_COMPILE" \
            LOCALVERSION="$LOCALVERSION" -j"$(nproc)" Image.gz dtbs modules

          test -f "build/${{ inputs.device_dtb }}"

          cat build/arch/arm64/boot/Image.gz "build/${{ inputs.device_dtb }}" > artifacts/kernel/kernel-dtb

          cp build/vmlinux artifacts/kernel/

      - name: Build Debian packages with bindeb-pkg
        run: |
          set -euxo pipefail

          test -f build/.config

          fakeroot make -C linux \
            O="$PWD/build" \
            ARCH="$ARCH" \
            CROSS_COMPILE="$CROSS_COMPILE" \
            LOCALVERSION="$LOCALVERSION" \
            -j"$(nproc)" \
            bindeb-pkg \
            KDEB_PKGVERSION=1.4 \
            KDEB_COMPRESS=xz \
            DPKG_FLAGS="-d"

      - name: Collect Debian package artifacts
        if: always()
        run: |
          set -euxo pipefail

          mkdir -p artifacts/deb

          find . -maxdepth 1 -type f -name "*.deb" -exec cp -v {} artifacts/deb/ \; || true
          find . -maxdepth 1 -type f -name "*.changes" -exec cp -v {} artifacts/deb/ \; || true
          find . -maxdepth 1 -type f -name "*.buildinfo" -exec cp -v {} artifacts/deb/ \; || true

          ls -lah artifacts/deb || true

      - name: Generate SHA256
        if: always()
        run: |
          set -euxo pipefail

          (
            cd artifacts
            find . -type f -print0 | sort -z | xargs -0 sha256sum
          ) > artifacts/SHA256SUMS.txt

      - name: Upload final artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: |
            artifacts/kernel
            artifacts/deb
            artifacts/config
            artifacts/patch-log
            artifacts/SHA256SUMS.txt
          if-no-files-found: warn
